name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android-build:
    name: Android AAR + Kotlin bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platforms, build-tools, and NDK
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393"
      - name: Build Rust libs for Android via cargo-ndk
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.1.8937393
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 -o android/sproutmobile/src/main/jniLibs build --release
      - name: Generate Kotlin bindings via UniFFI
        run: |
          mkdir -p android/sproutmobile/src/main/java
          cargo run --release --bin uniffi-bindgen -- \
            generate --library target/aarch64-linux-android/release/libsprout_mobile.so \
            --language kotlin --out-dir android/sproutmobile/src/main/java
      - name: Assemble AAR
        run: ./android/gradlew :sproutmobile:assembleDebug
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sprout-mobile-android-artifacts
          path: |
            android/sproutmobile/build/outputs/aar/*.aar
            android/sproutmobile/src/main/java/**
